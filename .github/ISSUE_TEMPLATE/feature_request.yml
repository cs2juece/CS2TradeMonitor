name: Feature request
description: Suggest a focused improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What workflow should become easier or safer?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the expected behavior and UI impact.
  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: Mention trading, login, automation, or privacy risks if relevant.
