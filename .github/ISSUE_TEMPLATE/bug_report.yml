name: Bug report
description: Report a reproducible problem in CS2 Trade Monitor.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: Describe what went wrong and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest steps that reproduce the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 1.3.6
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove tokens, cookies, account IDs, device IDs, order numbers, and local paths before attaching anything.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed real tokens, cookies, login state, API keys, device identifiers, order numbers, and personal data.
          required: true
